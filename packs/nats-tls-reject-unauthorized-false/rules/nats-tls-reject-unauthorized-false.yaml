# Auto-synthesized from a research Finding (proof-as-classifier loop).
# Pure data — every kind below resolves to a HUMAN-VETTED template in core.
id: nats-tls-reject-unauthorized-false
severity: high
title: "NATS connect with tls.rejectUnauthorized: false — the NATS server
  certificate is not validated (MITM)"
component:
  name: nats
  type: Networking
  version: ">=2.0.0"
  sourceUrl: https://github.com/nats-io/nats.js#tls
detect:
  modules:
    - nats
  nameRegex: nats|connect|client|broker|messaging|bus
  triggerCalls:
    - connect
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: connect
    argIndex: 0
    propName: tls.rejectUnauthorized
    forbiddenValue: false
    passDetail: The NATS client validates the server certificate
      (tls.rejectUnauthorized is not false) — the connection's TLS identity is
      verified.
    failDetail: "NATS connect is configured with tls: { rejectUnauthorized: false },
      disabling validation of the NATS server's TLS certificate. A network
      attacker can present a forged certificate and man-in-the-middle the
      connection — reading and injecting messages on every subject (events,
      commands, credentials). Remove rejectUnauthorized: false; trust the server
      CA via tls.ca."
    absentCallDetail: No NATS connect call in this scope; this rule does not apply here.
    absentArgDetail: NATS connect does not set tls.rejectUnauthorized; the secure
      default (validate) applies.
test:
  kind: none
