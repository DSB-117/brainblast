# Auto-synthesized from a research Finding (proof-as-classifier loop).
# Pure data — every kind below resolves to a HUMAN-VETTED template in core.
id: elasticsearch-tls-reject-unauthorized-false
severity: high
title: "new elasticsearch Client with tls.rejectUnauthorized: false — the search
  cluster certificate is not validated (MITM)"
component:
  name: "@elastic/elasticsearch"
  type: Database
  version: ">=8.0.0"
  sourceUrl: https://www.elastic.co/guide/en/elasticsearch/client/javascript-api/current/client-connecting.html
detect:
  modules:
    - "@elastic/elasticsearch"
  nameRegex: client|elastic|search|index|connect|es
  triggerCalls:
    - Client
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: Client
    argIndex: 0
    propName: tls.rejectUnauthorized
    forbiddenValue: false
    passDetail: The Elasticsearch client validates the cluster certificate
      (tls.rejectUnauthorized is not false) — the connection's TLS identity is
      verified.
    failDetail: "new Client is created with tls: { rejectUnauthorized: false },
      disabling validation of the Elasticsearch cluster's TLS certificate. A
      network attacker can present a forged certificate and man-in-the-middle
      the connection — reading indexed data (often PII/logs) and the API key or
      basic-auth credentials sent with each request. Remove rejectUnauthorized:
      false; trust the cluster CA via tls.ca."
    absentCallDetail: No Elasticsearch Client construction in this scope; this rule
      does not apply here.
    absentArgDetail: The Client does not set tls.rejectUnauthorized; the secure
      default (validate) applies.
test:
  kind: none
