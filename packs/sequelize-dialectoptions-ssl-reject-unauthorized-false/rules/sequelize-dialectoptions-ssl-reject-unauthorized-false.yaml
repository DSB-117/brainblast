id: sequelize-dialectoptions-ssl-reject-unauthorized-false
severity: critical
title: "new Sequelize with dialectOptions.ssl.rejectUnauthorized: false — the
  database TLS certificate is not validated (MITM)"
component:
  name: sequelize
  type: Database
  version: ">=6.0.0"
  sourceUrl: https://sequelize.org/docs/v6/other-topics/dialect-specific-things/#postgresql
detect:
  modules:
    - sequelize
  nameRegex: sequelize|db|database|orm|connect|conn
  triggerCalls:
    - Sequelize
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: Sequelize
    argIndex: 1
    propName: dialectOptions.ssl.rejectUnauthorized
    forbiddenValue: false
    passDetail: Sequelize validates the database server certificate
      (dialectOptions.ssl.rejectUnauthorized is not false) — the connection's
      TLS identity is verified.
    failDetail: "new Sequelize is created with dialectOptions: { ssl: {
      rejectUnauthorized: false } }, disabling validation of the database
      server's TLS certificate for every connection in the pool. A network
      attacker can present a forged certificate and man-in-the-middle the
      database — exposing every query, credential, and row. Remove
      rejectUnauthorized: false; provide the managed provider's CA via
      dialectOptions.ssl.ca."
    absentCallDetail: No Sequelize construction in this scope; this rule does not apply here.
    absentArgDetail: Sequelize does not set dialectOptions.ssl.rejectUnauthorized;
      the secure default (validate) applies.
test:
  kind: none
