# Auto-synthesized from a research Finding (proof-as-classifier loop).
# Pure data — every kind below resolves to a HUMAN-VETTED template in core.
id: cors-wildcard-origin
severity: high
title: "cors() configured with origin: \"*\" — any website can call the API with
  the user's session"
component:
  name: cors
  type: Auth
  version: ">=2.8.0"
  sourceUrl: https://github.com/expressjs/cors#configuration-options
detect:
  modules:
    - cors
  nameRegex: cors|app|server|middleware|index
  triggerCalls:
    - cors
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: cors
    argIndex: 0
    propName: origin
    forbiddenValue: "*"
    passDetail: cors() sets an explicit allow-list origin (not "*") — cross-origin
      access is restricted to trusted sites.
    failDetail: 'cors() is called with origin: "*", allowing ANY website to make
      cross-origin requests to this API. Combined with credentials, this lets a
      malicious page act as the logged-in user. Set origin to an explicit
      allow-list (a string, array, or function), not "*".'
    absentCallDetail: No cors() call in this scope; this rule does not apply here.
    absentArgDetail: cors() does not pass an origin literal; verify the resolved
      origin is a trusted allow-list, not "*".
test:
  kind: none
