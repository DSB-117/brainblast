# Auto-synthesized from a research Finding (proof-as-classifier loop).
# Pure data — every kind below resolves to a HUMAN-VETTED template in core.
id: jwt-verify-algorithm-none
severity: critical
title: jwt.verify accepts the "none" algorithm — signature verification can be
  bypassed
component:
  name: jsonwebtoken
  type: Auth
  version: ">=9.0.0"
  sourceUrl: https://github.com/auth0/node-jsonwebtoken#jwtverifytoken-secretorpublickey-options-callback
detect:
  modules:
    - jsonwebtoken
  nameRegex: verif|auth|token|jwt|session|login
  triggerCalls:
    - verify
check:
  kind: array-property-contains-forbidden-literal
  params:
    call: verify
    argIndex: 2
    propName: algorithms
    forbiddenValue: none
    passDetail: jwt.verify's algorithms allow-list does not include "none" —
      unsigned tokens are rejected.
    failDetail: 'jwt.verify is called with "none" in its algorithms allow-list. An
      attacker can forge a token with alg: none and no signature, and it will be
      accepted — full authentication bypass. Remove "none" from algorithms; pin
      to the real signing algorithm(s) (e.g. ["RS256"]).'
    absentCallDetail: No jwt.verify call in this scope; this rule does not apply here.
    absentArgDetail: jwt.verify does not pass an algorithms allow-list literal;
      verify the resolved list excludes "none".
test:
  kind: none
