# Auto-synthesized from a research Finding (proof-as-classifier loop).
# Pure data — every kind below resolves to a HUMAN-VETTED template in core.
id: res-cookie-httponly-false
severity: high
title: "res.cookie with httpOnly: false — the auth cookie is readable from
  JavaScript and can be stolen via XSS"
component:
  name: express
  type: Auth
  version: ">=4.0.0"
  sourceUrl: https://expressjs.com/en/api.html#res.cookie
detect:
  modules:
    - express
  nameRegex: cookie|login|auth|session|handler|route|controller
  triggerCalls:
    - cookie
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: cookie
    argIndex: 2
    propName: httpOnly
    forbiddenValue: false
    passDetail: "res.cookie sets httpOnly: true — the cookie is not exposed to
      document.cookie, so client-side scripts cannot read the session token."
    failDetail: "res.cookie is called with httpOnly: false, which makes the cookie
      readable by JavaScript via document.cookie. Any XSS anywhere on the origin
      can exfiltrate the session/auth token and hijack the account. Set
      httpOnly: true for authentication cookies."
    absentCallDetail: No res.cookie call in this scope; this rule does not apply here.
    absentArgDetail: "res.cookie does not set httpOnly; verify auth cookies are
      created with httpOnly: true."
test:
  kind: none
