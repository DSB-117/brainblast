# Auto-synthesized from a research Finding (proof-as-classifier loop).
# Pure data — every kind below resolves to a HUMAN-VETTED template in core.
id: jwt-expressjwt-ignore-notbefore
severity: high
title: express-jwt passes ignoreNotBefore:true through to jwt.verify, silently
  accepting not-yet-valid tokens
component:
  name: express-jwt
  type: Auth
  version: ">=1.0.0"
  sourceUrl: https://github.com/auth0/express-jwt/blob/master/src/index.ts
detect:
  modules:
    - express-jwt
  nameRegex: verify|auth|jwt
  triggerCalls:
    - expressjwt
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: expressjwt
    argIndex: 0
    propName: ignoreNotBefore
    forbiddenValue: true
    passDetail: expressjwt() options do not set ignoreNotBefore:true, so the
      underlying jwt.verify enforces the 'nbf' (not-before) claim and rejects
      tokens that are not yet valid.
    failDetail: expressjwt() is configured with ignoreNotBefore:true. express-jwt
      spreads the whole options object into jwt.verify(token, key, options)
      (src/index.ts:175), and Params extends jwt.VerifyOptions, so this flag
      flows straight through and disables 'nbf' enforcement. Tokens minted with
      a future not-before time are accepted as valid — the happy path compiles
      and runs, but pre-activation / future-dated tokens are honored.
    absentCallDetail: expressjwt() is not called in this module; no JWT middleware to inspect.
    absentArgDetail: expressjwt() is called without an options object;
      ignoreNotBefore cannot be asserted.
    absentPropDetail: expressjwt() options omit ignoreNotBefore, so 'nbf'
      enforcement follows the safe default (enabled).
test:
  kind: none
