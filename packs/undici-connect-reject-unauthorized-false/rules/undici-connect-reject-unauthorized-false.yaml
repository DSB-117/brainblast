id: undici-connect-reject-unauthorized-false
severity: high
title: "new undici Agent with connect.rejectUnauthorized: false — the HTTP
  client skips TLS certificate validation (MITM)"
component:
  name: undici
  type: Networking
  version: ">=5.0.0"
  sourceUrl: https://undici.nodejs.org/#/docs/api/Client?id=parameter-connectoptions
detect:
  modules:
    - undici
  nameRegex: agent|client|undici|http|fetch|dispatcher|pool
  triggerCalls:
    - Agent
    - Pool
    - Client
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: Agent
    argIndex: 0
    propName: connect.rejectUnauthorized
    forbiddenValue: false
    passDetail: The undici Agent validates server certificates
      (connect.rejectUnauthorized is not false) — TLS identity is verified for
      every request it dispatches.
    failDetail: "new undici Agent is created with connect: { rejectUnauthorized:
      false }, disabling TLS certificate validation for every request routed
      through it. When set as the global dispatcher (a common way to 'fix' cert
      errors for fetch/undici), the whole HTTP client silently trusts forged
      certificates and can be man-in-the-middled. Remove rejectUnauthorized:
      false; pass a trusted CA via connect.ca if a private CA is required."
    absentCallDetail: No undici Agent construction in this scope; this rule does not apply here.
    absentArgDetail: The undici Agent does not set connect.rejectUnauthorized; the
      secure default (validate) applies.
test:
  kind: none
