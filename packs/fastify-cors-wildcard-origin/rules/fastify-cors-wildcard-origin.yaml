# Auto-synthesized from a research Finding (proof-as-classifier loop).
# Pure data — every kind below resolves to a HUMAN-VETTED template in core.
id: fastify-cors-wildcard-origin
severity: high
title: "@fastify/cors registered with origin: \"*\" — any website can call the
  API with the user's session"
component:
  name: "@fastify/cors"
  type: Auth
  version: ">=8.0.0"
  sourceUrl: https://github.com/fastify/fastify-cors#options
detect:
  modules:
    - "@fastify/cors"
  nameRegex: cors|register|fastify|app|server|plugin
  triggerCalls:
    - register
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: register
    argIndex: 1
    propName: origin
    forbiddenValue: "*"
    passDetail: '@fastify/cors is registered with an explicit allow-list origin (not
      "*") — cross-origin access is restricted to trusted sites.'
    failDetail: '@fastify/cors is registered with origin: "*", allowing ANY website
      to make cross-origin requests to this API. Combined with credentials this
      lets a malicious page act as the logged-in user. Set origin to an explicit
      allow-list (a string, array, or function), not "*".'
    absentCallDetail: No plugin register call in this scope; this rule does not apply here.
    absentArgDetail: The @fastify/cors registration does not pass an origin literal;
      verify the resolved origin is a trusted allow-list, not "*".
test:
  kind: none
