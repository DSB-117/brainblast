# Auto-synthesized from a research Finding (proof-as-classifier loop).
# Pure data — every kind below resolves to a HUMAN-VETTED template in core.
id: knex-connection-ssl-reject-unauthorized-false
severity: critical
title: "knex with connection.ssl.rejectUnauthorized: false — the database TLS
  certificate is not validated (MITM)"
component:
  name: knex
  type: Database
  version: ">=2.0.0"
  sourceUrl: https://knexjs.org/guide/#configuration-options
detect:
  modules:
    - knex
  nameRegex: knex|db|database|query|connect|conn
  triggerCalls:
    - knex
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: knex
    argIndex: 0
    propName: connection.ssl.rejectUnauthorized
    forbiddenValue: false
    passDetail: knex validates the database server certificate
      (connection.ssl.rejectUnauthorized is not false) — the connection's TLS
      identity is verified.
    failDetail: "knex is initialized with connection: { ssl: { rejectUnauthorized:
      false } }, disabling validation of the database server's TLS certificate
      for the whole pool. A network attacker can present a forged certificate
      and man-in-the-middle the database — exposing every query, credential, and
      row. Remove rejectUnauthorized: false; provide the provider's CA via
      connection.ssl.ca."
    absentCallDetail: No knex() call in this scope; this rule does not apply here.
    absentArgDetail: knex() does not set connection.ssl.rejectUnauthorized; the
      secure default (validate) applies.
test:
  kind: none
