id: redis-socket-reject-unauthorized-false
severity: high
title: "node-redis createClient with socket.rejectUnauthorized: false — the
  Redis TLS certificate is not validated (MITM)"
component:
  name: redis
  type: Database
  version: ">=4.0.0"
  sourceUrl: https://github.com/redis/node-redis/blob/master/docs/client-configuration.md
detect:
  modules:
    - redis
  nameRegex: redis|cache|client|createClient|store|connect
  triggerCalls:
    - createClient
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: createClient
    argIndex: 0
    propName: socket.rejectUnauthorized
    forbiddenValue: false
    passDetail: The node-redis client validates the server certificate
      (socket.rejectUnauthorized is not false) — the rediss:// connection's TLS
      identity is verified.
    failDetail: "createClient is configured with socket: { rejectUnauthorized: false
      }, disabling validation of the Redis server's TLS certificate. A network
      attacker can present a forged certificate and man-in-the-middle the
      connection — reading and tampering with cached sessions, rate-limit
      counters, and queues. Remove rejectUnauthorized: false; trust the
      provider's CA via socket.ca."
    absentCallDetail: No node-redis createClient call in this scope; this rule does
      not apply here.
    absentArgDetail: createClient does not set socket.rejectUnauthorized; the secure
      default (validate) applies.
test:
  kind: none
