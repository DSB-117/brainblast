# Auto-synthesized from a research Finding (proof-as-classifier loop).
# Pure data — every kind below resolves to a HUMAN-VETTED template in core.
id: solana-backpack-sendrawtransaction-skippreflight
severity: high
title: "connection.sendRawTransaction called with skipPreflight: true skips
  simulation and silently lands failing transfers"
component:
  name: "@solana/web3.js"
  type: Blockchain
  version: ">=1.0.0"
  sourceUrl: https://solana.com/docs/rpc/http/sendtransaction
detect:
  modules:
    - "@solana/web3.js"
  nameRegex: send|confirm|swap|transfer|burn
  triggerCalls:
    - sendRawTransaction
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: sendRawTransaction
    argIndex: 1
    propName: skipPreflight
    forbiddenValue: true
    passDetail: sendRawTransaction runs preflight simulation (skipPreflight not set
      to true), so a transaction that would fail on-chain is rejected
      client-side before submission.
    failDetail: "sendRawTransaction is called with skipPreflight: true, disabling
      the preflight simulation. A malformed or failing transfer is submitted
      anyway; the happy path returns a signature but the transaction can fail or
      do the wrong thing on-chain with no client-side error surfaced to the
      user."
    absentCallDetail: No sendRawTransaction call found in this file.
    absentArgDetail: sendRawTransaction is called without an options object, so
      skipPreflight defaults to false (preflight runs). Safe.
test:
  kind: none
