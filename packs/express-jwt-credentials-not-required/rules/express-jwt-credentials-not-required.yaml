# Auto-synthesized from a research Finding (proof-as-classifier loop).
# Pure data — every kind below resolves to a HUMAN-VETTED template in core.
id: express-jwt-credentials-not-required
severity: critical
title: "express-jwt with credentialsRequired: false — routes that look protected
  accept requests with NO token"
component:
  name: express-jwt
  type: Auth
  version: ">=7.0.0"
  sourceUrl: https://github.com/auth0/express-jwt#usage
detect:
  modules:
    - express-jwt
  nameRegex: jwt|auth|guard|middleware|protect|secure|expressjwt
  triggerCalls:
    - expressjwt
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: expressjwt
    argIndex: 0
    propName: credentialsRequired
    forbiddenValue: false
    passDetail: express-jwt requires credentials (credentialsRequired is not false)
      — a request without a valid token is rejected before it reaches the
      protected handler.
    failDetail: "express-jwt is configured with credentialsRequired: false, so
      requests that carry NO Authorization token are allowed through instead of
      being rejected. Every route behind this middleware silently becomes
      optional-auth: an anonymous caller reaches the handler, and any code that
      assumes req.auth exists runs unauthenticated. Only set
      credentialsRequired: false on genuinely public routes; protected routes
      must leave it at the default (true)."
    absentCallDetail: No expressjwt() call in this scope; this rule does not apply here.
    absentArgDetail: expressjwt() does not set credentialsRequired; the secure
      default (true) applies.
test:
  kind: none
