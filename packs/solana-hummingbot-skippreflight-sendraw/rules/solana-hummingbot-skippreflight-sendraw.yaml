    failDetail: "sendRawTransaction is called with skipPreflight: true. Preflight
      simulation is disabled, so transactions that would fail (stale blockhash,
      insufficient funds, failing swap, slippage breach) are broadcast blindly
      and silently dropped or land as failed, instead of being caught before
      submission."
