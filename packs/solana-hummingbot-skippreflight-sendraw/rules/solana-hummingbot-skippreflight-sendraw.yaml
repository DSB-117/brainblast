  params:
    call: sendRawTransaction
    argIndex: 1
    propName: skipPreflight
    forbiddenValue: true
    passDetail: sendRawTransaction is called with skipPreflight left at its safe
      default (false), so the RPC simulates the transaction before broadcasting
