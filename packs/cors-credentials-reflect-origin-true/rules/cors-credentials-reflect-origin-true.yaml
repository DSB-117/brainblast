# Auto-synthesized from a research Finding (proof-as-classifier loop).
# Pure data — every kind below resolves to a HUMAN-VETTED template in core.
id: cors-credentials-reflect-origin-true
severity: high
title: "cors() with origin: true and credentials — reflects any caller's origin,
  leaking authenticated responses cross-site"
component:
  name: cors
  type: Auth
  version: ">=2.8.0"
  sourceUrl: https://github.com/expressjs/cors#configuration-options
detect:
  modules:
    - cors
  nameRegex: cors|app|server|middleware|index
  triggerCalls:
    - cors
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: cors
    argIndex: 0
    propName: origin
    forbiddenValue: true
    passDetail: cors() pins origin to an explicit trusted value (not the
      reflect-everything `true`) — cross-origin credentialed access is limited
      to that allow-list.
    failDetail: "cors() is called with origin: true, which REFLECTS whatever Origin
      the request carries back in Access-Control-Allow-Origin. With credentials:
      true this defeats the browser's `*`-plus-credentials guard: every site the
      victim visits can make credentialed cross-origin calls and read the
      authenticated responses. Pin origin to an explicit allow-list (string,
      array, or a validating function), never `true`."
    absentCallDetail: No cors() call in this scope; this rule does not apply here.
    absentArgDetail: cors() does not pass an origin literal; verify the resolved
      origin is a trusted allow-list, not a blanket reflect.
test:
  kind: none
