id: got-https-reject-unauthorized-false
severity: high
title: "got() with https.rejectUnauthorized: false — the HTTP client skips TLS
  certificate validation (MITM)"
component:
  name: got
  type: Networking
  version: ">=11.0.0"
  sourceUrl: https://github.com/sindresorhus/got/blob/main/documentation/2-options.md#https
detect:
  modules:
    - got
  nameRegex: got|fetch|client|request|http|api|call
  triggerCalls:
    - got
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: got
    argIndex: 1
    propName: https.rejectUnauthorized
    forbiddenValue: false
    passDetail: got keeps certificate validation on (https.rejectUnauthorized is not
      false) — the server's TLS identity is verified.
    failDetail: "got is called with https: { rejectUnauthorized: false }, disabling
      TLS certificate validation for the request. Any machine on the network
      path can present a forged certificate and man-in-the-middle the call —
      capturing credentials, tokens, and response data. Remove
      rejectUnauthorized: false; pass a trusted CA via
      https.certificateAuthority if a private CA is required."
    absentCallDetail: No got() call in this scope; this rule does not apply here.
    absentArgDetail: got() does not set https.rejectUnauthorized; the secure default
