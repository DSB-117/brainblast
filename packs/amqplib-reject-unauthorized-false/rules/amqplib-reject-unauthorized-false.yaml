# Auto-synthesized from a research Finding (proof-as-classifier loop).
# Pure data — every kind below resolves to a HUMAN-VETTED template in core.
id: amqplib-reject-unauthorized-false
severity: high
title: "amqplib connect with rejectUnauthorized: false — the RabbitMQ broker
  certificate is not validated (MITM)"
component:
  name: amqplib
  type: Networking
  version: ">=0.8.0"
  sourceUrl: https://amqp-node.github.io/amqplib/channel_api.html#connect
detect:
  modules:
    - amqplib
  nameRegex: amqp|connect|rabbit|broker|queue|mq
  triggerCalls:
    - connect
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: connect
    argIndex: 1
    propName: rejectUnauthorized
    forbiddenValue: false
    passDetail: The amqplib connection validates the broker certificate
      (rejectUnauthorized is not false) — the amqps:// connection's TLS identity
      is verified.
    failDetail: "amqplib connect is called with rejectUnauthorized: false in its
      socket options, disabling validation of the RabbitMQ broker's TLS
      certificate. A network attacker can present a forged certificate and
      man-in-the-middle the connection — reading and injecting messages on every
      queue (jobs, events, credentials). Remove rejectUnauthorized: false; trust
      the broker CA via the `ca` socket option."
    absentCallDetail: No amqplib connect call in this scope; this rule does not apply here.
    absentArgDetail: amqplib connect does not set rejectUnauthorized; the secure
      default (validate) applies.
test:
  kind: none
