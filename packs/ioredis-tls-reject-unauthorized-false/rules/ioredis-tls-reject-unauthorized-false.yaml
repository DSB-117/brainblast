id: ioredis-tls-reject-unauthorized-false
severity: high
title: "new Redis with tls.rejectUnauthorized: false — the Redis TLS certificate
  is not validated (MITM)"
component:
  name: ioredis
  type: Database
  version: ">=4.0.0"
  sourceUrl: https://github.com/redis/ioredis#tls-options
detect:
  modules:
    - ioredis
  nameRegex: redis|cache|client|connect|store|Redis
  triggerCalls:
    - Redis
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: Redis
    argIndex: 0
    propName: tls.rejectUnauthorized
    forbiddenValue: false
    passDetail: The ioredis client validates the server certificate
      (tls.rejectUnauthorized is not false) — the Redis connection's TLS
      identity is verified.
    failDetail: "new Redis is created with tls: { rejectUnauthorized: false },
      disabling validation of the Redis server's TLS certificate. Anyone on the
      network path can present a forged certificate and man-in-the-middle the
      connection — reading and tampering with cached sessions, rate-limit
      counters, and queues. Remove rejectUnauthorized: false; trust the
      provider's CA via tls.ca."
    absentCallDetail: No ioredis Redis construction in this scope; this rule does not apply here.
    absentArgDetail: The Redis client does not set tls.rejectUnauthorized; the
      secure default (validate) applies.
test:
  kind: none
