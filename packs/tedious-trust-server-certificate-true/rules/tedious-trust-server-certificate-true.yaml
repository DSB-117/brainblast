# Auto-synthesized from a research Finding (proof-as-classifier loop).
# Pure data — every kind below resolves to a HUMAN-VETTED template in core.
id: tedious-trust-server-certificate-true
severity: critical
title: "new tedious Connection with options.trustServerCertificate: true — the
  SQL Server TLS certificate is not validated (MITM)"
component:
  name: tedious
  type: Database
  version: ">=11.0.0"
  sourceUrl: https://tediousjs.github.io/tedious/api-connection.html
detect:
  modules:
    - tedious
  nameRegex: connection|tedious|sql|db|database|connect|mssql
  triggerCalls:
    - Connection
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: Connection
    argIndex: 0
    propName: options.trustServerCertificate
    forbiddenValue: true
    passDetail: The tedious Connection validates the server certificate
      (options.trustServerCertificate is not true) — the SQL Server connection's
      TLS identity is verified.
    failDetail: "new tedious Connection is created with options: {
      trustServerCertificate: true }, which makes the driver trust ANY
      certificate the SQL Server presents. A network attacker can present a
      forged certificate and man-in-the-middle the connection — exposing every
      query, credential, and record. Remove trustServerCertificate: true;
      install and trust the server's real CA instead."
    absentCallDetail: No tedious Connection construction in this scope; this rule
      does not apply here.
    absentArgDetail: The tedious Connection does not set
      options.trustServerCertificate; the secure default (validate) applies.
test:
  kind: none
