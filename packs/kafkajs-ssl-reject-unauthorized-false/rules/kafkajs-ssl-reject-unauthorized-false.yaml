id: kafkajs-ssl-reject-unauthorized-false
severity: high
title: "new Kafka with ssl.rejectUnauthorized: false — the broker TLS
  certificate is not validated (MITM)"
component:
  name: kafkajs
  type: Networking
  version: ">=1.15.0"
  sourceUrl: https://kafka.js.org/docs/configuration#ssl
detect:
  modules:
    - kafkajs
  nameRegex: kafka|broker|client|producer|consumer|connect|Kafka
  triggerCalls:
    - Kafka
check:
  kind: object-arg-property-forbidden-literal
  params:
    call: Kafka
    argIndex: 0
    propName: ssl.rejectUnauthorized
    forbiddenValue: false
    passDetail: The Kafka client validates the broker certificate
      (ssl.rejectUnauthorized is not false) — the broker connection's TLS
      identity is verified.
    failDetail: "new Kafka is created with ssl: { rejectUnauthorized: false },
      disabling validation of the broker's TLS certificate. A network attacker
      can present a forged certificate and man-in-the-middle the connection —
      reading and injecting messages on every topic (events, commands, PII
      streams). Remove rejectUnauthorized: false; trust the broker CA via
      ssl.ca."
    absentCallDetail: No Kafka construction in this scope; this rule does not apply here.
    absentArgDetail: The Kafka client does not set ssl.rejectUnauthorized; the
      secure default (validate) applies.
test:
  kind: none
